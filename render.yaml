services:
  - type: web
    name: aerial-stampede-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: instance/stampede.db
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ESP32_ALERT_URL
        sync: false
